  async function initMatches() {
    // Verificar con UNA sola consulta si ya existen los partidos
    const snap = await getDoc(doc(db,"settings","matchesInit"));
    if(snap.exists()) return; // Ya están inicializados, no hacer nada

    // Solo la primera vez: crear todos los partidos en paralelo
    const batch = [];
    for(const m of MATCHES){
      batch.push(setDoc(doc(db,"matches",m.id), m));
    }
    await Promise.all(batch);
    // Marcar que ya se inicializaron
    await setDoc(doc(db,"settings","matchesInit"),{done:true});
  }

  async function loadSettings() {
    const snap = await getDoc(doc(db,"settings","site"));
    if (snap.exists()) siteSettings = {...siteSettings,...snap.data()};
    else await setDoc(doc(db,"settings","site"), siteSettings);
    applySettings();
  }

  function applySettings() {
    if (siteSettings.bgImage) {
      document.body.style.backgroundImage=`url(${siteSettings.bgImage})`;
      document.body.style.backgroundSize="cover";
      document.body.style.backgroundAttachment="fixed";
    } else {
      document.body.style.backgroundImage="";
      document.body.style.backgroundColor=siteSettings.bg||"#0a0a1a";
    }
    const ann=document.getElementById("announcement-bar");
    if(ann){ann.textContent=siteSettings.announcement||"";ann.style.display=siteSettings.announcement?"block":"none";}
    const wp=document.getElementById("whatsapp-btn");
    if(wp) wp.href=siteSettings.whatsappLink||"#";
    renderAdminPhotos();
  }

  function renderAdminPhotos(){
    const c=document.getElementById("photos-section");
    if(!c) return;
    const p=siteSettings.adminPhotos||[];
    if(!p.length){c.innerHTML="";return;}
    c.innerHTML=`<h3 class="section-title">📸 Resultados</h3><div class="photos-grid">${p.map(x=>`<div class="photo-card"><img src="${x.url}"><p>${x.caption||""}</p></div>`).join("")}</div>`;
  }

  function calcPoints(pred,official){
    if(!official||official.home===null) return null;
    if(pred.home===official.home&&pred.away===official.away) return 3;
    const pw=pred.home>pred.away?"h":pred.home<pred.away?"a":"d";
    const ow=official.home>official.away?"h":official.home<official.away?"a":"d";
    return pw===ow?1:0;
  }

  onAuthStateChanged(auth,async(user)=>{
    currentUser=user;
    if(user){
      isAdmin  = user.email===ADMIN_EMAIL;
      isAdmin2 = user.email===ADMIN2_EMAIL;
      await Promise.all([loadSettings(), initMatches()]);
      // Admins no necesitan código
      if(isAdmin||isAdmin2){ renderApp(); return; }
      // Verificar si el usuario ya tiene código de acceso
      const userSnap=await getDoc(doc(db,"users",user.uid));
      if(userSnap.exists()&&userSnap.data().accessCode){
        renderApp();
      }else{
        renderAccessCodeScreen();
      }
    }else{isAdmin=false;isAdmin2=false;renderAuth();}
  });

  window.doLogin=async()=>{
    const isPhone=document.getElementById("lt-phone").classList.contains("active");
    const pass=document.getElementById("li-pass").value;
    let emailToUse="";
    if(isPhone){
      const phone=document.getElementById("li-phone").value.trim().replace(/\s/g,"");
      if(!phone){document.getElementById("auth-msg").textContent="Ingresa tu número de teléfono.";return;}
      emailToUse=`502${phone}@quiniela2026.tel`;
    }else{
      emailToUse=document.getElementById("li-email").value.trim();
    }
    try{await signInWithEmailAndPassword(auth,emailToUse,pass);}
    catch(e){document.getElementById("auth-msg").textContent=friendlyError(e.code);}
  };

    const pass=document.getElementById("rg-pass").value;
    const isPhone=document.getElementById("rt-phone").classList.contains("active");

    let emailToUse=emailVal;
    let phoneForDB="";

  window.submitAccessCode=async()=>{
    const code=document.getElementById("access-code-input").value.trim().toUpperCase();
    const msg=document.getElementById("code-msg");
    if(!code){msg.textContent="Ingresa el código.";return;}
    msg.textContent="Verificando...";
    msg.style.color="var(--muted)";

    const codeSnap=await getDoc(doc(db,"accessCodes",code));
    if(!codeSnap.exists()){msg.textContent="❌ Código inválido.";msg.style.color="var(--red)";return;}
    const codeData=codeSnap.data();
    if(codeData.used){msg.textContent="❌ Este código ya fue utilizado.";msg.style.color="var(--red)";return;}

    // Marcar código como usado y actualizar usuario
    const userSnap=await getDoc(doc(db,"users",currentUser.uid));
    const userData=userSnap.exists()?userSnap.data():{};
    await Promise.all([
      updateDoc(doc(db,"users",currentUser.uid),{accessCode:code,verified:true}),
      updateDoc(doc(db,"accessCodes",code),{used:true,usedBy:userData.displayName||"",usedAt:serverTimestamp()})
    ]);

    msg.textContent="✅ Código válido. ¡Bienvenido!";
    msg.style.color="var(--green)";
    setTimeout(()=>renderApp(), 1000);
  };

  function renderGroupSelector(main, myPreds){
    const groups=[...new Set(allMatches.map(m=>m.group))].sort();

    // Calcular cuántos partidos tiene cada grupo ya guardados
    const groupStats=groups.map(g=>{
      const gMatches=allMatches.filter(m=>m.group===g);
      const saved=gMatches.filter(m=>myPreds[m.id]!==undefined).length;
      const total=gMatches.length;
      const allLocked=gMatches.every(m=>m.locked||myPreds[m.id]!==undefined);
      return {g, saved, total, allLocked};
    });

    let groupBtns=groupStats.map(({g,saved,total,allLocked})=>`
      <button class="group-selector-btn ${allLocked?'group-done':saved>0?'group-partial':''}" onclick="renderGroupMatches('${g}')">
        <span class="gs-label">Grupo ${g}</span>
        <span class="gs-count">${saved}/${total}</span>
        ${allLocked?'<span class="gs-check">✅</span>':saved>0?'<span class="gs-check">⏳</span>':''}
      </button>`).join("");

    main.innerHTML=`<div class="section-wrap">
      <h2 class="page-title">⚽ Mis Pronósticos</h2>
      <p class="subtitle">Selecciona un grupo para ingresar tus pronósticos.</p>
      <button class="btn-print" onclick="printMisPronos()">🖨️ Imprimir mis pronósticos</button>
      <div class="group-selector-grid">${groupBtns}</div>
    </div>`;
  }

  window.renderGroupMatches=async(groupLetter)=>{
    const main=document.getElementById("main-content");
    main.innerHTML=`<div class="loading">Cargando…</div>`;
    const predSnap=await getDoc(doc(db,"predictions",currentUser.uid));
    const myPreds=predSnap.exists()?predSnap.data().preds||{}:{};
    window._myPreds=myPreds;

    const gMatches=allMatches.filter(m=>m.group===groupLetter);
    let html=`<div class="section-wrap">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
        <button class="btn-back" onclick="renderGroupSelector(document.getElementById('main-content'),window._myPreds)">← Grupos</button>
        <h2 class="page-title" style="margin-bottom:0">Grupo ${groupLetter}</h2>
      </div>
      <div class="matches-list">`;

    let hasUnsaved=false;
    for(const m of gMatches){
      const pred=myPreds[m.id];
      const locked=m.locked||pred!==undefined;
      const official=m.official;
      let pts=null;
      if(pred&&official) pts=calcPoints(pred,official);

      html+=`<div class="match-row ${locked&&pred?'predicted':''}">
        <div class="match-teams">
          <span class="team">${f(m.home)} ${m.home}</span>

        html+=`<div class="pred-display">
          <span class="pred-score">${pred.home} - ${pred.away}</span>
          ${pts!==null?`<span class="pts pts-${pts}">${pts} pts</span>`:""}
          ${official?`<span class="official-score">Oficial: ${official.home}-${official.away}</span>`:""}
        </div>`;
      }else if(m.locked){
        html+=`<div class="locked-msg">🔒 Cerrado</div>`;
      }else{
        hasUnsaved=true;
        html+=`
          <input type="number" id="h_${m.id}" min="0" max="20" placeholder="0" class="score-input">
          <span class="dash">-</span>
          <input type="number" id="a_${m.id}" min="0" max="20" placeholder="0" class="score-input">`;
      }
      html+=`</div></div>`;
    }

    html+=`</div>`;

    // Botón guardar grupo si hay partidos sin guardar
    if(hasUnsaved){
      html+=`<button class="btn-save-group" onclick="saveGroupPreds('${groupLetter}')">💾 Guardar pronósticos del Grupo ${groupLetter}</button>`;
    }

    html+=`</div>`;
    main.innerHTML=html;
  };

  window.saveGroupPreds=async(groupLetter)=>{
    const gMatches=allMatches.filter(m=>m.group===groupLetter);
    const predRef=doc(db,"predictions",currentUser.uid);
    const snap=await getDoc(predRef);
    const existing=snap.exists()?snap.data().preds||{}:{};

    let saved=0, skipped=0;
    for(const m of gMatches){
      if(existing[m.id]!==undefined){ skipped++; continue; }
      if(m.locked) continue;
      const hEl=document.getElementById(`h_${m.id}`);
      const aEl=document.getElementById(`a_${m.id}`);
      if(!hEl||!aEl) continue;
      const h=parseInt(hEl.value);
      const a=parseInt(aEl.value);
      if(isNaN(h)||isNaN(a)) continue;
      existing[m.id]={home:h,away:a};
      saved++;
    }

    if(saved===0){
      alert("⚠️ No hay pronósticos nuevos para guardar. Asegúrate de ingresar los marcadores.");
      return;
    }

    await setDoc(predRef,{uid:currentUser.uid,preds:existing},{merge:true});
    window._myPreds=existing;
    alert(`✅ Se guardaron ${saved} pronóstico(s) del Grupo ${groupLetter}.`);
    renderGroupSelector(document.getElementById("main-content"), existing);
  };

    if(isNaN(h)||isNaN(a)){alert("Ingresa ambos marcadores.");return;}
    const predRef=doc(db,"predictions",currentUser.uid);
    const snap=await getDoc(predRef);
    const existing=snap.exists()?snap.data().preds||{}:{};
    if(existing[matchId]!==undefined){alert("Ya guardaste este pronóstico.");return;}
    existing[matchId]={home:h,away:a};
    await setDoc(predRef,{uid:currentUser.uid,preds:existing},{merge:true});
    showSection("pronos");
  };

  async function renderTabla(main){
    main.innerHTML=`<div class="loading">Calculando tabla…</div>`;
    const matchSnap=await getDocs(collection(db,"matches"));
    // Ordenar partidos cronológicamente
    const sortedMatches=matchSnap.docs.map(d=>d.data()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    allMatches=sortedMatches;
    const officialMap={};
    sortedMatches.forEach(m=>{if(m.official) officialMap[m.id]=m.official;});
    const predsSnap=await getDocs(collection(db,"predictions"));
    const usersSnap=await getDocs(collection(db,"users"));
    const userMap={};
    usersSnap.forEach(d=>{userMap[d.id]=d.data();});
    const leaderboard=[];
    predsSnap.forEach(d=>{
      const uid=d.id,preds=d.data().preds||{};
      if(!userMap[uid]) return;
      let pts=0,exact=0;
      const circles=sortedMatches.map(m=>{
        const off=officialMap[m.id];
        const pred=preds[m.id];
        if(!off) return "pending"; // sin resultado aún
        if(!pred) return "none";   // no puso pronóstico
        const p=calcPoints(pred,off);
        if(p===3) return "exact";
        if(p===1) return "winner";
        return "miss";
      });
      sortedMatches.forEach(m=>{
        const off=officialMap[m.id];
        const pred=preds[m.id];
        if(!off||!pred) return;
        const p=calcPoints(pred,off);
        if(p===3){pts+=3;exact++;}else if(p===1){pts+=1;}
      });
      leaderboard.push({uid,name:userMap[uid].displayName||userMap[uid].name||uid,pts,exact,circles});
    });
    leaderboard.sort((a,b)=>b.pts-a.pts||b.exact-a.exact);

    const medals=["🥇","🥈","🥉"];
    const tiedPts=new Set();
    for(let i=0;i<leaderboard.length;i++)
      for(let j=i+1;j<leaderboard.length;j++)
        if(leaderboard[i].pts===leaderboard[j].pts) tiedPts.add(leaderboard[i].pts);

    // Generar encabezado con nombres de partidos rotados
    const matchHeaders=sortedMatches.map(m=>{
      const h=m.home.length>6?m.home.substring(0,5)+'…':m.home;
      const a=m.away.length>6?m.away.substring(0,5)+'…':m.away;
      return `<th style="padding:1px 0;vertical-align:bottom;min-width:13px;max-width:13px">

      </th>`;

      <h2 class="page-title">📊 Tabla de Posiciones</h2>

        ${circleCells}

    if(!leaderboard.length) html+=`<tr><td colspan="4" style="text-align:center;padding:2rem">Sin datos aún.</td></tr>`;
    html+=`</tbody></table></div></div>`;
    main.innerHTML=html;
    window._leaderboard=leaderboard;
    window._sortedMatchesPrint=sortedMatches;
  }

  window.printTabla=()=>{
    const lb=window._leaderboard||[];
    const matches=window._sortedMatchesPrint||allMatches;
    const medals=["🥇","🥈","🥉"];
    const tiedPts=new Set();
    for(let i=0;i<lb.length;i++)
      for(let j=i+1;j<lb.length;j++)
        if(lb[i].pts===lb[j].pts) tiedPts.add(lb[i].pts);

    const colorMap={exact:"#16a34a",winner:"#ca8a04",miss:"#dc2626",pending:"#d1d5db",none:"#e5e7eb"};

  async function renderAdmin2(main){
    if(!isAdmin2){main.innerHTML="<p>Acceso denegado.</p>";return;}
    const matchSnap=await getDocs(collection(db,"matches"));
    allMatches=matchSnap.docs.map(d=>({...d.data()})).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    const usersSnap=await getDocs(collection(db,"users"));
    const users=[];
    usersSnap.forEach(d=>users.push(d.data()));
    const userMap={};
    usersSnap.forEach(d=>{userMap[d.id]=d.data();});
    const predsSnap=await getDocs(collection(db,"predictions"));
    const predsMap={};
    predsSnap.forEach(d=>{predsMap[d.id]=d.data().preds||{};});
    const officialMap={};
    allMatches.forEach(m=>{if(m.official) officialMap[m.id]=m.official;});
    const leaderboard=[];
    predsSnap.forEach(d=>{
      const uid=d.id,preds=d.data().preds||{};
      if(!userMap[uid]) return;
      let pts=0,exact=0,winner=0;
      for(const [mid,pred] of Object.entries(preds)){
        const off=officialMap[mid];if(!off) continue;
        const p=calcPoints(pred,off);
        if(p===3){pts+=3;exact++;}else if(p===1){pts+=1;winner++;}
      }
      leaderboard.push({uid,name:userMap[uid].displayName||userMap[uid].name||uid,pts,exact,winner});
    });
    leaderboard.sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
    window._leaderboard=leaderboard;
    const medals=["🥇","🥈","🥉"];
    let tablaRows=leaderboard.map((r,i)=>`<tr class="${i<3?'top-'+i:''}"><td>${medals[i]||i+1}</td><td>${r.name}</td><td class="pts-cell">${r.pts}</td><td>${r.exact}</td><td>${r.winner}</td></tr>`).join("");
    if(!leaderboard.length) tablaRows=`<tr><td colspan="5" style="text-align:center;padding:2rem">Sin datos aún.</td></tr>`;

    main.innerHTML=`<div class="section-wrap admin-panel">
      <h2 class="page-title">⚙️ Panel Admin</h2>

      <div class="admin-card">
        <h3>📊 Tabla de Posiciones</h3>

          <button class="btn-print" style="margin-bottom:0" onclick="printTodosPronos()">📄 Imprimir pronósticos</button>
        </div>
        <div class="table-wrap"><table class="leaderboard">
          <thead><tr><th>#</th><th>Participante</th><th>Pts</th><th>Exactos</th><th>Ganador</th></tr></thead>
          <tbody>${tablaRows}</tbody>
        </table></div>
      </div>

        allPreds.push({user:userMap[d.id],preds:d.data().preds||{}});
    });
    allPreds.sort((a,b)=>(a.user.displayName||"").localeCompare(b.user.displayName||""));
    const groups=[...new Set(matches.map(m=>m.group))].sort();

    function buildUserBlock(entry){
      const u=entry.user;
      let rows="";
      for(const g of groups){
        const gMatches=matches.filter(x=>x.group===g);
        gMatches.forEach((m,idx)=>{
          const p=entry.preds[m.id];
          const sh=p!==undefined?p.home:"?";
          const sa=p!==undefined?p.away:"?";
          rows+=`<tr>
            ${idx===0?`<td class="glabel" rowspan="${gMatches.length}">${g}</td>`:""}
            <td class="tname right">${m.home}</td>
            <td class="score">${sh}:${sa}</td>
            <td class="tname left">${m.away}</td>
          </tr>`;
        });
      }
      return `<div class="user-block">
        <div class="user-header">${u.displayName||u.name} <span>${u.phone||u.email}</span></div>
        <table><tbody>${rows}</tbody></table>
      </div>`;
    }

    // Dividir en 2 columnas
    const col1=allPreds.filter((_,i)=>i%2===0).map(buildUserBlock).join("");
    const col2=allPreds.filter((_,i)=>i%2!==0).map(buildUserBlock).join("");

      .user-header{background:#2d2d7e;color:white;font-weight:700;font-size:7.5px;padding:2px 4px;border-radius:2px 2px 0 0;display:flex;justify-content:space-between}
      .user-header span{font-weight:400;font-size:6.5px;opacity:.85}
      table{width:100%;border-collapse:collapse}
      td{padding:1px 2px;border:1px solid #ddd;font-size:6.5px;color:#000}
      td.glabel{background:#1a1a3e;color:#f0b429;font-family:'Bebas Neue',sans-serif;font-size:9px;text-align:center;width:10px;vertical-align:middle}
      td.tname{font-weight:700;color:#000;width:38%}
      td.right{text-align:right}
      td.left{text-align:left}
      td.score{text-align:center;font-family:'Bebas Neue',sans-serif;font-size:8px;color:#000;background:#f5f5f5;width:30px;white-space:nowrap}
      @page{margin:4mm;size:letter portrait}
      @media print{.user-block{break-inside:avoid}}
    </style></head><body>
    <div class="main-header">

    <div class="cols">
      <div>${col1}</div>
      <div>${col2}</div>
    </div>
    </body></html>`);
    win.document.close();win.print();
  };
